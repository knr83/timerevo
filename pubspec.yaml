name: timerevo
description: Local desktop time tracking (Flutter + drift + SQLite).
publish_to: 'none'
version: 2026.3.3+0

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.41.0 <3.42.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Persistence
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path: ^1.9.1
  path_provider: ^2.1.5

  # Export
  archive: ^4.0.0
  file_selector: ^1.0.3
  pdf: ^3.11.0

  # Utils
  material_symbols_icons: ^4.2906.0
  table_calendar: ^3.2.0
  crypto: ^3.0.6
  cryptography: ^2.9.0
  flutter_markdown_plus: ^1.0.7
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  sqlite3: ^3.0.0

dependency_overrides:
  image: ^4.5.4

dev_dependencies:
  image: ^4.7.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.31.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/legal/
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
